name: Build & Deploy Static Site (Astro)

on:
  # Triggered by the Cloudflare Worker after daily scrape (1:30 PM IST)
  workflow_dispatch:
    inputs:
      puzzle_number:
        description: 'Puzzle number that triggered this build'
        required: false
        default: ''
      puzzle_date:
        description: 'Puzzle date (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    defaults:
      run:
        working-directory: frontend-astro

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-astro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fetch data from Worker API
        run: node scripts/fetch-data.js
        env:
          API_BASE: ${{ secrets.API_BASE }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}

      - name: Build static site (Astro)
        run: npx astro build

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -la dist/
          echo ""
          echo "Data files:"
          ls -la dist/data/ 2>/dev/null || echo "No data directory"
          echo ""
          echo "Solutions files:"
          ls -la dist/data/solutions/ 2>/dev/null || echo "No solutions directory"
          echo ""
          echo "Build size:"
          du -sh dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=linkedin-pinpoint-answers
          workingDirectory: frontend-astro
